<svg width="680" height="330" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .hdr { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
    .t   { font-size: 13px; font-weight: 700; }
    .ts  { font-size: 11px; }
    .lg  { font-size: 11px; fill: #444441; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="330" fill="#ffffff"/>

  <text class="hdr" x="40" y="30">LogPulse — events → MongoDB + Elasticsearch (batch &amp; streaming)</text>

  <!-- Batch lane -->
  <text class="lg" x="40" y="52" style="font-weight:700;fill:#1a1a1a">Batch mode</text>
  <g>
    <rect x="40" y="60" width="130" height="56" rx="6" fill="#F1EFE8" stroke="#888780"/>
    <text class="t" x="105" y="86" text-anchor="middle" fill="#2C2C2A">Source</text>
    <text class="ts" x="105" y="103" text-anchor="middle" fill="#5F5E5A">synthetic/file/REST</text>
  </g>
  <g>
    <rect x="200" y="60" width="150" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD"/>
    <text class="t" x="275" y="86" text-anchor="middle" fill="#26215C">Transform + quality</text>
    <text class="ts" x="275" y="103" text-anchor="middle" fill="#534AB7">validate, dedup</text>
  </g>
  <g>
    <rect x="380" y="60" width="150" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
    <text class="t" x="455" y="86" text-anchor="middle" fill="#04342C">Store + index</text>
    <text class="ts" x="455" y="103" text-anchor="middle" fill="#0F6E56">MongoDB + Elastic</text>
  </g>
  <g>
    <rect x="560" y="60" width="80" height="56" rx="6" fill="#FAECE7" stroke="#D85A30"/>
    <text class="t" x="600" y="86" text-anchor="middle" fill="#4A1B0C">Search</text>
    <text class="ts" x="600" y="103" text-anchor="middle" fill="#993C1D">+ UI</text>
  </g>
  <line x1="170" y1="88" x2="199" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="88" x2="379" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="88" x2="559" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streaming lane -->
  <text class="lg" x="40" y="152" style="font-weight:700;fill:#1a1a1a">Real-time mode (Kafka)</text>
  <g>
    <rect x="40" y="160" width="130" height="56" rx="6" fill="#F1EFE8" stroke="#888780"/>
    <text class="t" x="105" y="186" text-anchor="middle" fill="#2C2C2A">Producer</text>
    <text class="ts" x="105" y="203" text-anchor="middle" fill="#5F5E5A">emit events</text>
  </g>
  <g>
    <rect x="200" y="160" width="150" height="56" rx="6" fill="#FBEAF0" stroke="#ED93B1"/>
    <text class="t" x="275" y="186" text-anchor="middle" fill="#4B1528">Kafka topic</text>
    <text class="ts" x="275" y="203" text-anchor="middle" fill="#993556">logpulse.events</text>
  </g>
  <g>
    <rect x="380" y="160" width="150" height="56" rx="6" fill="#EEEDFE" stroke="#7F77DD"/>
    <text class="t" x="455" y="186" text-anchor="middle" fill="#26215C">Consumer</text>
    <text class="ts" x="455" y="203" text-anchor="middle" fill="#534AB7">→ same sinks</text>
  </g>
  <g>
    <rect x="560" y="160" width="80" height="56" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
    <text class="t" x="600" y="186" text-anchor="middle" fill="#04342C">Stores</text>
    <text class="ts" x="600" y="203" text-anchor="middle" fill="#0F6E56">Mongo+ES</text>
  </g>
  <line x1="170" y1="188" x2="199" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="188" x2="379" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="188" x2="559" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="240" width="600" height="34" rx="6" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="lg" x="340" y="261" text-anchor="middle">Apache NiFi can orchestrate the same flow · Docker Compose runs Kafka + Mongo + ES + Kibana + NiFi · CI on every push</text>

  <rect x="40" y="294" width="12" height="12" rx="2" fill="#B4B2A9"/><text class="lg" x="58" y="304">Source</text>
  <rect x="130" y="294" width="12" height="12" rx="2" fill="#ED93B1"/><text class="lg" x="148" y="304">Kafka</text>
  <rect x="210" y="294" width="12" height="12" rx="2" fill="#7F77DD"/><text class="lg" x="228" y="304">Transform</text>
  <rect x="320" y="294" width="12" height="12" rx="2" fill="#5DCAA5"/><text class="lg" x="338" y="304">MongoDB + Elasticsearch</text>
  <rect x="520" y="294" width="12" height="12" rx="2" fill="#D85A30"/><text class="lg" x="538" y="304">Search</text>
</svg>
