# LogPulse local stack: Kafka + MongoDB + Elasticsearch + Kibana + NiFi.
# Start everything:   docker compose up -d
# Stop & remove:      docker compose down -v
#
# Endpoints once healthy:
#   Kafka broker    localhost:9092
#   Redpanda console http://localhost:8085   (Kafka topic UI)
#   MongoDB         mongodb://localhost:27017
#   Elasticsearch   http://localhost:9200
#   Kibana          http://localhost:5601
#   NiFi (UI)       https://localhost:8443/nifi   (user: admin / pass: ctsBtRBKHRAx69EqUghvvgEvjnaLjFEB)

services:
  # Redpanda is a single-binary, Kafka-API-compatible broker — lighter than
  # ZooKeeper + Kafka but speaks the same protocol the Python clients use.
  kafka:
    image: redpandadata/redpanda:v24.1.7
    container_name: logpulse-kafka
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://kafka:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: logpulse-kafka-console
    environment:
      - KAFKA_BROKERS=kafka:29092
    ports:
      - "8085:8080"
    depends_on:
      - kafka

  mongodb:
    image: mongo:7
    container_name: logpulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: logpulse-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false        # local dev only — never do this in prod
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: logpulse-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  nifi:
    image: apache/nifi:1.27.0
    container_name: logpulse-nifi
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=ctsBtRBKHRAx69EqUghvvgEvjnaLjFEB
    ports:
      - "8443:8443"
    volumes:
      - nifi_conf:/opt/nifi/nifi-current/conf
      - ./nifi:/opt/nifi/nifi-current/ls-flows   # mount the flow template into the container

volumes:
  mongo_data:
  es_data:
  nifi_conf:
